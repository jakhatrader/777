<html lang="en">
<head>

<title>MUAR Perp DEX Tier List</title>

<link rel="icon" type="image/png" sizes="32x32" href="favicon-32x32.png">

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;600;700;900&family=Rajdhani:wght@300;400;500;600;700&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --neon-cyan: #00f0ff;
  --neon-pink: #ff00aa;
  --neon-green: #39ff14;
  --neon-yellow: #ffe600;
  --neon-purple: #b026ff;
  --bg-dark: #0a0a0f;
  --bg-card: rgba(10, 10, 20, 0.85);
  --border-glow: rgba(0, 240, 255, 0.15);
  --text-dim: #5a6a8a;
  --text-main: #c8d6e5;
}

html { scroll-behavior: smooth; }

body {
  background: var(--bg-dark);
  color: var(--text-main);
  font-family: 'Rajdhani', sans-serif;
  min-height: 100vh;
  overflow-x: hidden;
}

#bg-canvas {
  position: fixed; top: 0; left: 0;
  width: 100%; height: 100%;
  z-index: 0; pointer-events: none;
}

.scanline {
  position: fixed; top: 0; left: 0;
  width: 100%; height: 100%;
  background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,240,255,0.008) 2px, rgba(0,240,255,0.008) 4px);
  z-index: 1; pointer-events: none;
}

.vignette {
  position: fixed; top: 0; left: 0;
  width: 100%; height: 100%;
  background: radial-gradient(ellipse at center, transparent 50%, rgba(0,0,0,0.6) 100%);
  z-index: 1; pointer-events: none;
}

.container {
  position: relative; z-index: 2;
  max-width: 900px; margin: 0 auto;
  padding: 30px 20px 60px;
}

/* HEADER */
.header { text-align: center; padding: 40px 0 10px; }

.created-by {
  display: inline-flex; align-items: center; gap: 8px;
  font-family: 'Share Tech Mono', monospace;
  font-size: 14px; color: var(--text-dim);
  letter-spacing: 2px; text-transform: uppercase; margin-bottom: 6px;
}

.created-by a {
  display: inline-flex; align-items: center; gap: 6px;
  color: var(--neon-cyan); text-decoration: none;
  transition: all 0.3s; padding: 4px 10px;
  border: 1px solid rgba(0,240,255,0.2); border-radius: 4px;
}

.created-by a:hover {
  color: #fff; border-color: var(--neon-cyan);
  box-shadow: 0 0 15px rgba(0,240,255,0.3), inset 0 0 15px rgba(0,240,255,0.05);
  text-shadow: 0 0 10px var(--neon-cyan);
}

.created-by svg { width: 16px; height: 16px; fill: currentColor; }

.site-title {
  font-family: 'Orbitron', sans-serif; font-weight: 900;
  font-size: clamp(28px, 5vw, 52px); letter-spacing: 3px;
  background: linear-gradient(135deg, var(--neon-cyan), var(--neon-pink), var(--neon-cyan));
  background-size: 200% 200%;
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  background-clip: text;
  animation: gradient-shift 4s ease infinite;
  filter: drop-shadow(0 0 20px rgba(0,240,255,0.3)); margin-bottom: 6px;
}

@keyframes gradient-shift {
  0%, 100% { background-position: 0% 50%; }
  50% { background-position: 100% 50%; }
}

.subtitle {
  font-family: 'Rajdhani', sans-serif; font-style: italic; font-weight: 300;
  font-size: clamp(14px, 2.5vw, 20px); color: var(--text-dim);
  letter-spacing: 4px; text-transform: uppercase; margin-top: 4px;
}

/* STATS BAR */
.stats-bar { display: flex; justify-content: center; gap: 30px; margin: 30px 0 20px; flex-wrap: wrap; }

.stat-item {
  text-align: center; padding: 12px 24px;
  border: 1px solid var(--border-glow); border-radius: 8px;
  background: var(--bg-card); backdrop-filter: blur(10px); min-width: 160px;
}

.stat-label {
  font-family: 'Share Tech Mono', monospace; font-size: 10px;
  color: var(--text-dim); letter-spacing: 2px; text-transform: uppercase; margin-bottom: 4px;
}

.stat-value {
  font-family: 'Orbitron', sans-serif; font-size: 20px; font-weight: 700;
  color: var(--neon-cyan); text-shadow: 0 0 15px rgba(0,240,255,0.4);
}

/* TABLE */
.table-wrapper {
  border: 1px solid var(--border-glow); border-radius: 12px; overflow: hidden;
  background: var(--bg-card); backdrop-filter: blur(15px);
  box-shadow: 0 0 40px rgba(0,240,255,0.04), 0 20px 60px rgba(0,0,0,0.5);
}

table { width: 100%; border-collapse: collapse; }

thead th {
  font-family: 'Share Tech Mono', monospace; font-size: 11px;
  letter-spacing: 2px; text-transform: uppercase; color: var(--text-dim);
  padding: 16px; text-align: left;
  border-bottom: 1px solid rgba(0,240,255,0.1);
  background: rgba(0,240,255,0.02); position: sticky; top: 0; z-index: 10;
}

thead th:first-child { text-align: center; width: 80px; }
thead th:nth-child(3) { text-align: right; }


tbody tr {
  border-bottom: 1px solid rgba(255,255,255,0.03);
  transition: all 0.3s ease;
}

tbody tr:hover {
  background: rgba(0,240,255,0.03);
  box-shadow: inset 0 0 30px rgba(0,240,255,0.02);
}

tbody td { padding: 14px 16px; font-size: 15px; vertical-align: middle; }
tbody td:first-child { text-align: center; }
tbody td:nth-child(3) {
  text-align: right; font-family: 'Share Tech Mono', monospace;
  font-size: 14px; color: var(--neon-green);
  text-shadow: 0 0 8px rgba(57,255,20,0.2);
}


/* TIER BADGES */
.tier {
  display: inline-flex; align-items: center; justify-content: center;
  width: 44px; height: 44px; border-radius: 8px;
  font-family: 'Orbitron', sans-serif; font-weight: 900; font-size: 16px; letter-spacing: 1px;
}

.tier-s {
  color: var(--neon-yellow); border: 2px solid var(--neon-yellow);
  background: rgba(255,230,0,0.08);
  box-shadow: 0 0 15px rgba(255,230,0,0.2), inset 0 0 15px rgba(255,230,0,0.05);
  text-shadow: 0 0 12px var(--neon-yellow);
  animation: pulse-s 2s ease-in-out infinite;
}

@keyframes pulse-s {
  0%, 100% { box-shadow: 0 0 15px rgba(255,230,0,0.2), inset 0 0 15px rgba(255,230,0,0.05); }
  50% { box-shadow: 0 0 25px rgba(255,230,0,0.35), inset 0 0 20px rgba(255,230,0,0.1); }
}

.tier-a {
  color: var(--neon-cyan); border: 2px solid var(--neon-cyan);
  background: rgba(0,240,255,0.06);
  box-shadow: 0 0 12px rgba(0,240,255,0.15), inset 0 0 12px rgba(0,240,255,0.03);
  text-shadow: 0 0 10px var(--neon-cyan);
}

.tier-b {
  color: var(--neon-purple); border: 2px solid var(--neon-purple);
  background: rgba(176,38,255,0.06);
  box-shadow: 0 0 12px rgba(176,38,255,0.15), inset 0 0 12px rgba(176,38,255,0.03);
  text-shadow: 0 0 10px var(--neon-purple);
}

/* DEX CELL */
.dex-cell { display: flex; align-items: center; gap: 12px; }

.dex-icon {
  width: 32px; height: 32px; border-radius: 50%; object-fit: cover;
  border: 1px solid rgba(255,255,255,0.1); background: #1a1a2e; flex-shrink: 0;
}

.dex-name { font-weight: 600; font-size: 16px; letter-spacing: 0.5px; }

.dex-name a {
  color: var(--text-main); text-decoration: none; transition: all 0.3s; position: relative;
}

.dex-name a::after {
  content: ''; position: absolute; bottom: -2px; left: 0;
  width: 0; height: 1px; background: var(--neon-cyan);
  box-shadow: 0 0 6px var(--neon-cyan); transition: width 0.3s;
}

.dex-name a:hover { color: var(--neon-cyan); text-shadow: 0 0 10px rgba(0,240,255,0.3); }
.dex-name a:hover::after { width: 100%; }

/* TRADE BUTTON */
.trade-btn {
  display: inline-flex; align-items: center; gap: 5px;
  margin-left: auto; flex-shrink: 0;
  padding: 6px 14px; border-radius: 6px;
  font-family: 'Share Tech Mono', monospace; font-size: 11px;
  letter-spacing: 1px; text-transform: uppercase;
  text-decoration: none;
  color: var(--neon-cyan);
  border: 1px solid rgba(0,240,255,0.3);
  background: rgba(0,240,255,0.05);
  transition: all 0.3s ease;
  cursor: pointer;
  white-space: nowrap;
}

.trade-btn:hover {
  color: #fff;
  border-color: var(--neon-cyan);
  background: rgba(0,240,255,0.15);
  box-shadow: 0 0 18px rgba(0,240,255,0.3), inset 0 0 12px rgba(0,240,255,0.05);
  text-shadow: 0 0 8px var(--neon-cyan);
}

.trade-btn svg {
  width: 12px; height: 12px; fill: none; stroke: currentColor; stroke-width: 2.5;
  transition: transform 0.3s ease;
}

.trade-btn:hover svg {
  transform: translateX(3px);
}

.loading-cell {
  color: var(--text-dim); font-family: 'Share Tech Mono', monospace;
  font-size: 12px; animation: blink 1.2s infinite;
}

@keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }

.rank-num {
  font-family: 'Share Tech Mono', monospace; font-size: 12px;
  color: var(--text-dim); display: block; margin-top: 4px;
}

.no-data { color: var(--text-dim); font-size: 12px; opacity: 0.5; }

.footer {
  text-align: center; padding: 40px 0 20px;
  font-family: 'Share Tech Mono', monospace; font-size: 11px;
  color: rgba(90,106,138,0.5); letter-spacing: 2px;
}

.footer span { color: var(--neon-cyan); opacity: 0.6; }

.data-note {
  text-align: center; margin-top: 16px; font-size: 11px;
  color: var(--text-dim); font-family: 'Share Tech Mono', monospace;
  letter-spacing: 1px; opacity: 0.6;
}

.data-status {
  text-align: center; margin-top: 8px; font-size: 10px;
  font-family: 'Share Tech Mono', monospace; letter-spacing: 1px;
}

.data-status.ok { color: var(--neon-green); opacity: 0.5; }
.data-status.err { color: var(--neon-pink); opacity: 0.7; }

/* RESPONSIVE */
@media (max-width: 700px) {
  .container { padding: 16px 10px 40px; }
  .header { padding: 20px 0 6px; }
  .stats-bar { gap: 10px; }
  .stat-item { min-width: 120px; padding: 10px 14px; }
  .stat-value { font-size: 16px; }
  thead th { font-size: 9px; padding: 12px 8px; letter-spacing: 1px; }
  tbody td { padding: 10px 8px; font-size: 13px; }
  tbody td:nth-child(3) { font-size: 12px; }
  .tier { width: 36px; height: 36px; font-size: 13px; }
  .dex-icon { width: 26px; height: 26px; }
  .dex-name { font-size: 14px; }
  .dex-cell { gap: 8px; }
  .rank-num { font-size: 10px; }
  thead th:first-child { width: 55px; }
  .trade-btn { padding: 5px 10px; font-size: 10px; }
}

@media (max-width: 480px) {
  .site-title { letter-spacing: 1px; }
  .subtitle { letter-spacing: 2px; font-size: 12px; }
  thead th { font-size: 8px; padding: 10px 6px; }
  tbody td { padding: 8px 6px; }
  .dex-icon { width: 22px; height: 22px; }
  .dex-name { font-size: 13px; }
  .tier { width: 32px; height: 32px; font-size: 12px; border-width: 1.5px; }
  tbody td:nth-child(3) { font-size: 11px; }
  .trade-btn { padding: 4px 8px; font-size: 9px; gap: 3px; }
  .trade-btn svg { width: 10px; height: 10px; }
}
</style>
</head>

function fmtUSD(n) {
  if (!n || isNaN(n) || n === 0) return '<span class="no-data">\u2014</span>';
  if (n >= 1e9) return '$' + (n / 1e9).toFixed(2) + 'B';
  if (n >= 1e6) return '$' + (n / 1e6).toFixed(2) + 'M';
  if (n >= 1e3) return '$' + (n / 1e3).toFixed(1) + 'K';
  return '$' + n.toFixed(0);
}

function fmtPlain(n) {
  if (!n || n === 0) return '\u2014';
  if (n >= 1e9) return '$' + (n / 1e9).toFixed(2) + 'B';
  if (n >= 1e6) return '$' + (n / 1e6).toFixed(2) + 'M';
  if (n >= 1e3) return '$' + (n / 1e3).toFixed(1) + 'K';
  return '$' + n.toFixed(0);
}

function tierCls(t) { return 'tier tier-' + t.toLowerCase(); }

function fallbackIcon(name) {
  return `data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 32 32%22><rect width=%2232%22 height=%2232%22 rx=%2216%22 fill=%22%231a1a2e%22/><text x=%2216%22 y=%2221%22 text-anchor=%22middle%22 fill=%22%2300f0ff%22 font-size=%2214%22 font-family=%22monospace%22>${name[0]}</text></svg>`;
}

function render(dexes, loading) {
  const tbody = document.getElementById('dex-table-body');
  const sorted = [...dexes].sort((a, b) => (b.volume24h || 0) - (a.volume24h || 0));
  let tVol = 0;

  tbody.innerHTML = sorted.map((d, i) => {
    tVol += (d.volume24h || 0);
    const v = loading ? '<span class="loading-cell">loading...</span>' : fmtUSD(d.volume24h);
    return `<tr>
      <td><div class="${tierCls(d.tier)}">${d.tier}</div><span class="rank-num">#${i+1}</span></td>
      <td><div class="dex-cell">
        <img class="dex-icon" src="${d.icon}" alt="${d.name}" onerror="this.src='${fallbackIcon(d.name)}'">
        <div>
          <div class="dex-name"><a href="${d.ref}" target="_blank" rel="noopener">${d.name}</a></div>
        </div>
        <a class="trade-btn" href="${d.ref}" target="_blank" rel="noopener">Trade <svg viewBox="0 0 24 24"><polyline points="9 18 15 12 9 6"/></svg></a>
      </div></td>
      <td>${v}</td>
    </tr>`;
  }).join('');

  if (!loading) {
    document.getElementById('total-volume').textContent = fmtPlain(tVol);
  }
}

function setStatus(msg, ok) {
  const el = document.getElementById('data-status');
  el.textContent = msg;
  el.className = 'data-status ' + (ok ? 'ok' : 'err');
}

async function fetchData() {
  render(DEXES.map(d => ({ ...d, volume24h: 0 })), true);

  // Strategy 1: Bulk overview
  try {
    const r = await fetch('https://api.llama.fi/overview/derivatives?excludeTotalDataChart=true&excludeTotalDataChartBreakdown=true&dataType=dailyVolume');
    if (r.ok) {
      const data = await r.json();
      const protos = data.protocols || [];
      if (protos.length > 0) {
        const map = {};
        protos.forEach(p => {
          [p.defillamaId, p.module, p.name, p.displayName, p.slug]
            .filter(Boolean)
            .forEach(k => {
              map[k.toLowerCase()] = p;
              map[k.toLowerCase().replace(/\s+/g, '-')] = p;
              map[k.toLowerCase().replace(/[\s.-]+/g, '')] = p;
            });
        });

        const enriched = DEXES.map(d => {
          let m = null;
          for (const s of d.slugs) {
            m = map[s] || map[s.replace(/[.-]/g, '')] || map[s.replace(/-/g, ' ')];
            if (m) break;
          }
          if (!m) m = map[d.name.toLowerCase()] || map[d.name.toLowerCase().replace(/[\s.]+/g, '')];
          return { ...d, volume24h: m ? (m.total24h || m.dailyVolume || 0) : 0 };
        });

        render(enriched, false);
        setStatus(`defillama \u2713 \u2022 ${protos.length} protocols \u2022 ${new Date().toLocaleTimeString()}`, true);
        return;
      }
    }
  } catch (e) { console.warn('Bulk failed:', e); }

  // Strategy 2: Individual fetches
  const results = DEXES.map(d => ({ ...d, volume24h: 0 }));
  let loaded = 0;

  await Promise.allSettled(DEXES.map(async (d, i) => {
    for (const slug of d.slugs) {
      try {
        const r = await fetch(`https://api.llama.fi/summary/derivatives/${slug}?dataType=dailyVolume`);
        if (!r.ok) continue;
        const data = await r.json();
        const vol = data.total24h || data.totalVolume24h || 0;
        if (vol > 0) { results[i].volume24h = vol; loaded++; return; }
      } catch (e) {}
    }
  }));

  render(results, false);
  setStatus(`defillama \u2022 ${loaded}/${DEXES.length} loaded \u2022 ${new Date().toLocaleTimeString()}`, loaded > 0);
}

fetchData();
setInterval(fetchData, 5 * 60 * 1000);


// CANVAS BACKGROUND — INTENSE ELECTRIC STORM
(function() {
  const c = document.getElementById('bg-canvas');
  const ctx = c.getContext('2d');
  let w, h, t = 0;

  function resize() { w = c.width = innerWidth; h = c.height = innerHeight; }

  addEventListener('resize', resize);

  // ─── LIGHTNING BOLTS ───
  let bolts = [];
  function createBolt(forked) {
    const lx = Math.random() * w * 0.85 + w * 0.075;
    const col = [[0,240,255],[200,210,255],[255,0,170],[176,38,255]][Math.random()*4|0];
    const pts = [[lx, -10 + Math.random()*20]];
    const segs = forked ? 14 + Math.random()*14|0 : 8 + Math.random()*8|0;
    const spread = forked ? 90 : 50;
    for (let i = 0; i < segs; i++) {
      const p = pts[pts.length-1];
      pts.push([p[0]+(Math.random()-0.5)*spread, p[1]+18+Math.random()*55]);
    }
    const branches = [];
    if (forked) {
      for (let i = 2; i < pts.length; i++) {
        if (Math.random() < 0.5) {
          const bp = [[pts[i][0], pts[i][1]]];
          const bsegs = 3 + Math.random()*6|0;
          for (let j = 0; j < bsegs; j++) {
            const p = bp[bp.length-1];
            bp.push([p[0]+(Math.random()-0.5)*65, p[1]+12+Math.random()*40]);
          }
          branches.push(bp);
          if (Math.random() < 0.35) {
            const sbp = [[bp[bp.length-1][0], bp[bp.length-1][1]]];
            for (let j = 0; j < 3; j++) {
              const p = sbp[sbp.length-1];
              sbp.push([p[0]+(Math.random()-0.5)*40, p[1]+10+Math.random()*30]);
            }
            branches.push(sbp);
          }
        }
      }
    }
    bolts.push({ pts, branches, col, life: 1, decay: 0.006 + Math.random()*0.012, flash: forked ? 1.0 : 0.4 });
  }

  // ─── ELECTRIC ARCS ───
  let arcs = [];
  function createArc() {
    const y = Math.random() * h;
    const x1 = Math.random() * w * 0.5;
    const x2 = x1 + 80 + Math.random()*500;
    const col = Math.random() < 0.5 ? [0,240,255] : [255,0,170];
    const pts = [];
    let x = x1;
    while (x < x2) {
      pts.push([Math.min(x,x2), y + (Math.random()-0.5)*25]);
      x += 4 + Math.random()*14;
    }
    arcs.push({ pts, col, life: 1, decay: 0.012 + Math.random()*0.02 });
  }

  // ─── SHEET LIGHTNING ───
  let sheets = [];
  function createSheet() {
    const cx = Math.random() * w;
    const cy = Math.random() * h * 0.3;
    const r = 120 + Math.random()*300;
    const col = Math.random() < 0.5 ? [0,240,255] : [176,38,255];
    sheets.push({ cx, cy, r, col, life: 1, decay: 0.025 + Math.random()*0.035 });
  }

  // ─── RAIN (HEAVY) ───
  const rain = [];
  const RAIN_COUNT = 1800;
  for (let i = 0; i < RAIN_COUNT; i++) rain.push({
    x: Math.random()*3000-500, y: Math.random()*2000-500,
    speed: 8 + Math.random()*16, len: 16 + Math.random()*40,
    alpha: 0.06 + Math.random()*0.16, wind: 0
  });

  // ─── SPLASHES ───
  let splashes = [];
  function createSplash(x, y) {
    splashes.push({
      x, y, life: 1, decay: 0.04 + Math.random()*0.04,
      r: 2 + Math.random()*5,
      col: [130,180,255]
    });
  }

  // ─── THUNDER RUMBLE ───
  let shakeX = 0, shakeY = 0, shakeDecay = 0;

  // ─── CLOUDS ───
  const clouds = [];
  for (let i = 0; i < 14; i++) clouds.push({
    x: Math.random() * w * 1.3 - w * 0.15,
    y: -20 + Math.random() * h * 0.25,
    rx: 140 + Math.random()*250,
    ry: 35 + Math.random()*60,
    speed: 0.1 + Math.random()*0.35,
    col: Math.random() < 0.5 ? [80,30,120] : [40,20,80],
    baseAlpha: 0.05 + Math.random()*0.05
  });

  function drawClouds() {
    clouds.forEach(cl => {
      cl.x += cl.speed;
      if (cl.x > w + cl.rx) cl.x = -cl.rx * 2;
      const flashBoost = bolts.reduce((a,b) => a + Math.max(0, b.life - 0.4) * b.flash * 0.12, 0);
      const grd = ctx.createRadialGradient(cl.x, cl.y, 0, cl.x, cl.y, cl.rx);
      const a = cl.baseAlpha + flashBoost;
      grd.addColorStop(0, `rgba(${cl.col[0]},${cl.col[1]},${cl.col[2]},${a})`);
      grd.addColorStop(0.6, `rgba(${cl.col[0]},${cl.col[1]},${cl.col[2]},${a*0.4})`);
      grd.addColorStop(1, 'transparent');
      ctx.fillStyle = grd;
      ctx.fillRect(cl.x - cl.rx, cl.y - cl.ry, cl.rx*2, cl.ry*2);
    });
  }

  function drawBoltLine(pts, col, alpha, passes) {
    passes.forEach(([lw, la]) => {
      ctx.strokeStyle = `rgba(${col[0]},${col[1]},${col[2]},${la*alpha})`;
      ctx.lineWidth = lw;
      ctx.beginPath();
      pts.forEach((p,i) => i===0 ? ctx.moveTo(p[0],p[1]) : ctx.lineTo(p[0],p[1]));
      ctx.stroke();
    });
  }

  function drawGround() {
    const gy = h * 0.88;
    const flashPower = bolts.reduce((a,b) => a + Math.max(0, b.life) * b.flash * 0.05, 0);
    
    for (let y = gy; y < h; y++) {
      const progress = (y - gy) / (h - gy);
      const baseA = progress * 0.07;
      const flashA = flashPower * progress;
      ctx.fillStyle = `rgba(0,240,255,${baseA + flashA})`;
      ctx.fillRect(0, y, w, 1);
      if (progress > 0.3) {
        ctx.fillStyle = `rgba(255,0,170,${(baseA + flashA) * 0.3})`;
        ctx.fillRect(0, y, w, 1);
      }
    }
    
    ctx.shadowColor = '#00f0ff';
    ctx.shadowBlur = 8;
    ctx.strokeStyle = `rgba(0,240,255,${0.06 + flashPower * 0.5})`;
    ctx.lineWidth = 1;
    ctx.beginPath(); ctx.moveTo(0,gy); ctx.lineTo(w,gy); ctx.stroke();
    ctx.shadowBlur = 0;
    
    for (let i = 0; i < 6; i++) {
      const px = w*0.08 + i*w*0.18 + Math.sin(t*0.3+i)*15;
      const py = gy + 20 + i*12;
      const pr = 45 + Math.sin(t+i)*12;
      const grd = ctx.createRadialGradient(px,py,0,px,py,pr);
      grd.addColorStop(0, `rgba(0,240,255,${0.025 + flashPower*0.18})`);
      grd.addColorStop(1, 'transparent');
      ctx.fillStyle = grd;
      ctx.fillRect(px-pr,py-pr*0.3,pr*2,pr*0.6);
    }
  }

  // ─── WIND ───
  let windForce = 0;
  let windTarget = 0;

  (function draw() {
    t += 0.016;
    
    if (Math.random() < 0.005) windTarget = (Math.random()-0.5) * 5;
    windForce += (windTarget - windForce) * 0.01;

    if (shakeDecay > 0) {
      shakeX = (Math.random()-0.5) * shakeDecay * 8;
      shakeY = (Math.random()-0.5) * shakeDecay * 4;
      shakeDecay *= 0.94;
      if (shakeDecay < 0.01) { shakeDecay = 0; shakeX = 0; shakeY = 0; }
    }

    ctx.save();
    ctx.translate(shakeX, shakeY);

    ctx.fillStyle = '#060810';
    ctx.fillRect(-10, -10, w+20, h+20);

    const totalFlash = bolts.reduce((a,b) => {
      if (b.life > 0.6) return a + (b.life-0.6) * b.flash;
      return a;
    }, 0);
    if (totalFlash > 0) {
      ctx.fillStyle = `rgba(180,200,255,${Math.min(0.2, totalFlash * 0.15)})`;
      ctx.fillRect(-10,-10,w+20,h+20);
    }

    drawClouds();

    // Spawn lightning — MUCH MORE FREQUENT
    if (Math.random() < 0.035) { createBolt(true); shakeDecay = 0.6 + Math.random()*0.6; }
    if (Math.random() < 0.06) createBolt(false);
    if (Math.random() < 0.08) createArc();
    if (Math.random() < 0.06) createSheet();

    // Sheet lightning
    sheets.forEach(s => {
      const grd = ctx.createRadialGradient(s.cx, s.cy, 0, s.cx, s.cy, s.r);
      grd.addColorStop(0, `rgba(${s.col[0]},${s.col[1]},${s.col[2]},${s.life*0.1})`);
      grd.addColorStop(0.5, `rgba(${s.col[0]},${s.col[1]},${s.col[2]},${s.life*0.04})`);
      grd.addColorStop(1, 'transparent');
      ctx.fillStyle = grd;
      ctx.fillRect(s.cx-s.r, s.cy-s.r, s.r*2, s.r*2);
      s.life -= s.decay;
    });
    sheets = sheets.filter(s => s.life > 0);

    // Draw bolts
    bolts.forEach(b => {
      drawBoltLine(b.pts, b.col, b.life, [[12,0.04],[7,0.1],[3.5,0.22],[1.8,0.5],[0.8,0.8]]);
      b.branches.forEach(br => drawBoltLine(br, b.col, b.life*0.7, [[6,0.05],[2.5,0.15],[1,0.4]]));
      
      if (b.life > 0.4) {
        const tip = b.pts[b.pts.length-1];
        const grd = ctx.createRadialGradient(tip[0], tip[1], 0, tip[0], tip[1], 80);
        grd.addColorStop(0, `rgba(${b.col[0]},${b.col[1]},${b.col[2]},${(b.life-0.4)*0.4})`);
        grd.addColorStop(1, 'transparent');
        ctx.fillStyle = grd;
        ctx.fillRect(tip[0]-80, tip[1]-80, 160, 160);
      }
      b.life -= b.decay;
    });
    bolts = bolts.filter(b => b.life > 0);

    // Arcs
    arcs.forEach(a => {
      ctx.strokeStyle = `rgba(${a.col[0]},${a.col[1]},${a.col[2]},${a.life*0.4})`;
      ctx.lineWidth = 1.2 + a.life;
      ctx.beginPath();
      a.pts.forEach((p,i) => i===0 ? ctx.moveTo(p[0],p[1]) : ctx.lineTo(p[0],p[1]));

      ctx.strokeStyle = `rgba(${a.col[0]},${a.col[1]},${a.col[2]},${a.life*0.1})`;
      ctx.lineWidth = 6 + a.life*4;
      ctx.beginPath();
      a.pts.forEach((p,i) => i===0 ? ctx.moveTo(p[0],p[1]) : ctx.lineTo(p[0],p[1]));

    });

        if (Math.random() < 0.25) createSplash(r.x, groundY);
        r.y = -30 - Math.random()*100;
        r.x = Math.random() * w * 1.4 - w*0.2;
      }
      if (r.x < -50) r.x = w + 50;
      if (r.x > w + 50) r.x = -50;
      
      const windOffset = (windForce + r.speed*0.15) * (r.len / r.speed);
      ctx.strokeStyle = `rgba(150,185,255,${r.alpha})`;
      ctx.lineWidth = 1;
      ctx.beginPath();
      ctx.moveTo(r.x, r.y);
      ctx.lineTo(r.x - windOffset, r.y + r.len);
      ctx.stroke();
    });

    // Splashes
    splashes.forEach(s => {
      const r = s.r * (1 - s.life) * 3;
      ctx.strokeStyle = `rgba(${s.col[0]},${s.col[1]},${s.col[2]},${s.life*0.35})`;
      ctx.lineWidth = 0.8;
      ctx.beginPath();
      ctx.ellipse(s.x, s.y, r, r*0.3, 0, 0, Math.PI*2);
      ctx.stroke();
      s.life -= s.decay;
    });
    splashes = splashes.filter(s => s.life > 0);

    drawGround();

    // Vignette
    const vig = ctx.createRadialGradient(w/2,h/2,w*0.15,w/2,h/2,w*0.8);
    vig.addColorStop(0,'transparent');
    vig.addColorStop(1,'rgba(0,0,0,0.55)');
    ctx.fillStyle = vig;
    ctx.fillRect(-10,-10,w+20,h+20);

    // Scanlines
    for (let i=0; i<6; i++) {
      const sy = (t*40 + i*160) % (h+20) - 10;
      ctx.fillStyle = 'rgba(0,240,255,0.018)';
      ctx.fillRect(-10,sy,w+20,3);
    }

    ctx.restore();
    requestAnimationFrame(draw);
  })();
})();
</script>
